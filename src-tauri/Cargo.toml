[package]
publish = false
edition = "2021"
name = "steam-presence"
version = "0.0.0"
authors = ["silvanshade <silvanshade@users.noreply.github.com>"]
license = "Apache-2.0 WITH LLVM-exception"
repository = "https://github.com/silvanshade/steam-presence"
description = """
A system-tray application for reporting Steam status as Discord rich presence
"""
default-run = "steam-presence"

[features]
# by default Tauri runs in production mode
# when `tauri dev` runs it is executed with `cargo run --no-default-features` if `devPath` is an URL
default = ["custom-protocol"]
# this feature is used used for production builds where `devPath` points to the filesystem
# DO NOT remove this
custom-protocol = ["tauri/custom-protocol"]
debug = ["tracing", "tracing-subscriber"]

[build-dependencies]
tauri-build = { version = "1.0", features = [] }

[dependencies]
cached = { version = "0.37.0", default-features = false }
directories = "4.0"
discord-rich-presence = "0.2"
exitcode = "1.1"
reqwest = { version = "0.11", default-features = false, features = ["json"] }
serde = { version = "1.0", default-features = false }
serde_json = { version = "1.0", default-features = false }
snafu = { version = "0.7", default-features = false, features = ["std"] }
tauri = { version = "1.0", default-features = false, features = ["system-tray", "wry"] }
tokio = { version = "1.20", default-features = false }
tracing = { version = "0.1", default-features = false, features = ["attributes"], optional = true }
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi"], optional = true }

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = "s"
panic = "abort"
strip = true
